<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD__bear Luxury Collection 🐻</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* الأساسيات والمتغيرات */
        :root {
            --primary: #1a1a1a;
            --accent: #25d366; /* WhatsApp Green */
            --accent-dark: #1ebd59;
            --price: #ffffff;
            --text-main: #333333;
            --card-bg: rgba(255, 255, 255, 0.9);
            --body-bg: #0d0d0d;
            
            /* تدرج خلفية متحرك */
            --bg-gradient: linear-gradient(-45deg, #0d0d0d, #1a1a1a, #0d0d0d, #262626);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0; 
            padding: 0;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* تنسيق الـ Header الزجاجي */
        header { 
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(10px);
            color: white; 
            padding: 50px 20px; 
            text-align: center;
            position: relative;
            z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        header h1 { 
            margin: 0; 
            font-size: 3.5rem; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p { opacity: 0.7; font-size: 1.2rem; margin-top: 15px; font-weight: 400; }

        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 40px; 
            max-width: 1300px; 
            margin: 0 auto;
            padding: 60px 20px 100px;
        }

        /* تنسيق بطاقة المنتج الفاخرة */
        .card { 
            background: var(--card-bg); 
            border-radius: 30px; 
            overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .card:hover { 
            transform: translateY(-20px) scale(1.02); 
            box-shadow: 0 30px 60px rgba(37, 211, 102, 0.2);
        }

        .image-container {
            width: 100%;
            height: 420px;
            overflow: hidden;
            position: relative;
        }

        /* طبقة حماية (Overlay) عند الهوفر */
        .image-container::after {
            content: 'عرض سريع';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            font-size: 1.2rem;
        }

        .card:hover .image-container::after { opacity: 1; }

        .card img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .card:hover img { transform: scale(1.1); }

        .info { 
            padding: 30px; 
            text-align: center; 
            background: var(--primary);
            position: relative;
        }
        
        .info h3 { 
            margin: 0; 
            color: #fff; 
            font-size: 1.5rem;
            font-weight: 700;
        }

        .price { 
            color: var(--accent); 
            font-size: 2rem; 
            font-weight: 900; 
            font-family: 'Montserrat', sans-serif;
            margin: 15px 0;
            display: block;
        }

        .card .btn-fake {
            background: var(--accent);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-flex; align-items: center; gap: 10px;
        }

        /* --- واجهة عرض المنتج الكاملة (Product Showcase Modal) --- */
        .product-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .product-modal.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: #fff;
            color: var(--text-main);
            width: 90%; max-width: 1100px;
            height: 90vh;
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            position: relative;
            transform: scale(0.9);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .product-modal.active .modal-content { transform: scale(1); }

        .close-modal {
            position: absolute;
            top: 25px; left: 25px;
            background: rgba(0,0,0,0.1);
            color: var(--primary);
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer;
            z-index: 10;
        }
        .close-modal:hover { background: var(--primary); color: #fff; }

        /* يمين المودال (الصور) */
        .modal-gallery { flex: 1.2; background: #f9f9f9; padding: 20px; display: flex; flex-direction: column; }
        .main-modal-img { width: 100%; flex: 1; object-fit: cover; border-radius: 25px; margin-bottom: 20px; }
        .gallery-thumbs { display: flex; gap: 15px; justify-content: center; }
        .thumb-img { width: 80px; height: 80px; object-fit: cover; border-radius: 15px; cursor: pointer; border: 3px solid transparent; }
        .thumb-img:hover, .thumb-img.active { border-color: var(--accent); transform: translateY(-5px); }

        /* يسار المودال (التفاصيل) */
        .modal-details { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; text-align: right;}
        .modal-details h2 { font-size: 2.8rem; margin: 0; color: var(--primary); }
        .modal-details .modal-price { color: var(--accent-dark); font-size: 3rem; font-weight: 900; margin: 20px 0; font-family: 'Montserrat', sans-serif; }
        .modal-details p.desc { color: #666; font-size: 1.1rem; line-height: 1.8; margin-bottom: 30px; }
        
        /* خيارات المقاس */
        .size-picker { margin-bottom: 40px; }
        .size-picker h4 { margin-bottom: 10px; color: #333; }
        .sizes { display: flex; gap: 15px; justify-content: flex-end;}
        .size-btn { 
            width: 60px; height: 60px; border-radius: 15px; 
            border: 2px solid #ddd; background: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; font-family: 'Montserrat', sans-serif;
        }
        .size-btn:hover, .size-btn.active { border-color: var(--primary); background: var(--primary); color: #fff; }

        /* زر الواتساب الحقيقي */
        .modal-details .btn-final { 
            display: flex; align-items: center; justify-content: center; gap: 15px;
            background: var(--accent); color: white; padding: 20px; 
            text-decoration: none; border-radius: 20px; font-weight: 900; font-size: 1.3rem;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
        }
        .modal-details .btn-final:hover { background: var(--accent-dark); transform: scale(1.05); }

        /* تذييل الصفحة */
        footer { text-align: center; padding: 40px; color: rgba(255,255,255,0.4); font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.05); margin-top: auto;}

        /* تجاوب للموبايل */
        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
            .modal-content { flex-direction: column; height: auto; overflow-y: auto; }
            .modal-gallery { height: 400px; }
            .modal-details { padding: 30px; text-align: center; }
            .sizes { justify-content: center; }
            .close-modal { top: 15px; left: 15px; background: #fff; }
        }
    </style>
</head>
