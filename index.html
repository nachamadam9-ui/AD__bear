<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD__bear Luxury | 🐻🍷</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg:#000; --card:#0d0d0d; --royal:#6a040f; --white:#fff; }
        body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--white); margin:0; padding:0; }
        header { text-align:center; padding:40px 20px; border-bottom:2px solid var(--royal); }
        
        .container { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px; max-width:1200px; margin:auto; }
        
        /* البطاقة */
        .card { background:var(--card); border-radius:12px; overflow:hidden; transition:.3s; cursor:pointer; border: 1px solid #1a1a1a; position: relative; }
        .card:hover { transform:translateY(-5px); border: 1px solid var(--royal); }
        .card img { width:100%; height:300px; object-fit:cover; pointer-events: none; }
        .card-info { padding:15px; text-align:center; pointer-events: none; }
        .price { color:var(--royal); font-weight:bold; font-size:18px; display:block; margin:5px 0; }
        .btn-fake { background:var(--royal); color:white; padding:10px; width:100%; border-radius:6px; border:none; font-weight:bold; pointer-events: none; }

        /* النافذة المنبثقة - الإصلاح هنا */
        #productModal { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); /* سواد شبه تام للتركيز */
            display: none; /* مخفي */
            align-items: center; 
            justify-content: center; 
            z-index: 99999; /* أعلى طبقة ممكنة */
        }

        .modal-box { 
            background:#111; 
            padding:20px; 
            border-radius:15px; 
            border:1px solid var(--royal);
            max-width:450px; 
            width:90%; 
            text-align:center; 
            position:relative; /* ضروري لزر الإغلاق */
            animation:fade .3s ease;
        }

        @keyframes fade { from {opacity:0; transform:scale(.9)} to {opacity:1; transform:scale(1)} }

        /* زر الإغلاق الفوري */
        .close-btn { 
            position: absolute; 
            top: -50px; /* خارج المربع قليلاً للأعلى */
            left: 0; 
            font-size: 40px; 
            cursor: pointer; 
            color: #fff; 
            font-weight: bold;
            z-index: 100001;
            padding: 10px;
        }

        #modalImg { width:100%; border-radius:10px; margin-bottom:15px; max-height:350px; object-fit:cover; }
        
        /* زر الواتساب - التأكد من ظهوره وقابليته للضغط */
        .wa-link { 
            display: block !important; 
            margin-top: 15px; 
            background: #25d366; 
            padding: 15px; 
            border-radius: 10px; 
            text-decoration: none; 
            color: white; 
            font-weight: bold; 
            font-size: 1.2rem;
            position: relative;
            z-index: 100002;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
        .wa-link:hover { background: #128c7e; }
    </style>
</head>
<body>

<header>
    <h1>AD__bear Luxury 🐻🍷</h1>
</header>

<div class="container">
    <div class="card" onclick="openMe('سترة Charcoal مضلعة', '250 DH', '1775131386342_edit_165168220411784.png')">
        <img src="1775131386342_edit_165168220411784.png">
        <div class="card-info">
            <h3>Charcoal Ribbed</h3>
            <span class="price">199 DH</span>
            <button class="btn-fake">عرض المزيد</button>
        </div>
    </div>

    <div class="card" onclick="openMe('كنزة Cream المخططة', '250 DH', '1775131549809_edit_165190750270682.png')">
        <img src="1775131549809_edit_165190750270682.png">
        <div class="card-info">
            <h3>Cream Beige</h3>
            <span class="price">199 DH</span>
            <button class="btn-fake">عرض المزيد</button>
        </div>
    </div>

    <div class="card" onclick="openMe('سترة Navy الكلاسيكية', '250 DH', 'Screenshot_20260402_130701.jpg')">
        <img src="Screenshot_20260402_130701.jpg">
        <div class="card-info">
            <h3>Navy Classic</h3>
            <span class="price">199 DH</span>
            <button class="btn-fake">عرض المزيد</button>
        </div>
    </div>

    <div class="card" onclick="openMe('سترة Midnight Grey', '250 DH', 'Screenshot_20260402_130639_edit_165151901325644.jpg')">
        <img src="Screenshot_20260402_130639_edit_165151901325644.jpg">
        <div class="card-info">
            <h3>Dark Grey</h3>
            <span class="price">199 DH</span>
            <button class="btn-fake">عرض المزيد</button>
        </div>
    </div>
</div>

<div id="productModal">
    <div class="modal-box">
        <span class="close-btn" onclick="closeMe()">إغلاق ×</span>
        
        <img id="modalImg" src="">
        <h2 id="modalTitle" style="margin:10px 0; color:#fff;"></h2>
        <div id="modalPrice" style="color:var(--royal); font-size:24px; font-weight:bold; margin-bottom:15px;"></div>
        
        <a id="waBtn" href="#" target="_blank" class="wa-link">
            اطلب عبر واتساب الآن
        </a>
    </div>
</div>

<script>
    // وظيفة الفتح المضمونة
    function openMe(name, price, image) {
        // تحديث البيانات
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('modalPrice').innerText = price;
        document.getElementById('modalImg').src = image;
        
        // تجهيز الرابط
        var message = "مرحباً متجر AD__bear، أريد طلب: " + name;
        document.getElementById('waBtn').href = "https://wa.me/212770940367?text=" + encodeURIComponent(message);
        
        // إظهار النافذة
        document.getElementById('productModal').style.display = "flex";
        // منع التمرير في الخلفية حتى لا يضيع المستخدم
        document.body.style.overflow = "hidden";
    }

    // وظيفة الإغلاق المضمونة
    function closeMe() {
        document.getElementById('productModal').style.display = "none";
        document.body.style.overflow = "auto";
    }

    // إغلاق عند الضغط على المساحة السوداء
    document.getElementById('productModal').onclick = function(event) {
        if (event.target == this) {
            closeMe();
        }
    };
</script>

</body>
</html>
