<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD__bear Luxury Knitwear | Stealth Collection 🐻</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* الأساسيات والمتغيرات - لوحة مونوكروم (Monochrome Palette) */
        :root {
            --primary: #0a0a0a; /* أسود غامق جداً */
            --accent: #222222; /* رمادي غامق جداً للتأثيرات */
            --accent-glow: rgba(255, 255, 255, 0.1);
            --text-main: #f5f5f5; /* أبيض دخاني للنصوص */
            --text-muted: #888888; /* رمادي متوسط */
            --card-bg: #0a0a0a;
            --body-bg: #050505; /* أسود داكن */
            --card-border: #1a1a1a;
            --whatsapp-bg: #f5f5f5; /* خلفية زر الواتساب الرمادية */
            --whatsapp-text: #050505; /* نص زر الواتساب الداكن */
        }

        /* تنسيق عام */
        * { box-sizing: border-box; transition: all 0.5s ease; outline: none; }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--body-bg); 
            margin: 0; 
            padding: 0;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* تنسيق الـ Header الغامق */
        header { 
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%); 
            padding: 80px 20px; 
            text-align: center;
            position: relative;
            z-index: 10;
            border-bottom: 1px solid #1a1a1a;
        }

        header h1 { 
            margin: 0; 
            font-size: 4rem; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            letter-spacing: -3px;
            color: var(--text-main);
            text-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        header p { 
            color: var(--text-muted); 
            font-size: 1.3rem; 
            margin-top: 20px; 
            font-weight: 400; 
            letter-spacing: 1px;
        }

        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 40px; 
            max-width: 1300px; 
            margin: 0 auto;
            padding: 60px 20px 100px;
        }

        /* تنسيق بطاقة المنتج المونوكروم */
        .card { 
            background: var(--card-bg); 
            border-radius: 30px; 
            overflow: hidden; 
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            cursor: pointer;
            position: relative;
            will-change: transform;
        }

        .card:hover { 
            transform: translateY(-20px) scale(1.02); 
            box-shadow: 0 25px 60px var(--accent-glow);
            border-color: #333;
        }

        .image-container {
            width: 100%;
            height: 420px;
            overflow: hidden;
            position: relative;
        }

        /* تأثير Grayscale بلمسة عصرية */
        .card img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), filter 0.6s ease;
            filter: grayscale(1); /* الصورة رمادية في البداية */
        }

        .card:hover img { 
            transform: scale(1.1);
            filter: grayscale(0); /* الألوان تعود عند الهوفر */
        }

        .info { 
            padding: 30px; 
            text-align: center; 
            position: relative;
        }
        
        .info h3 { 
            margin: 0; 
            color: var(--text-main); 
            font-size: 1.6rem;
            font-weight: 700;
        }

        .price { 
            color: var(--text-main); 
            font-size: 2rem; 
            font-weight: 900; 
            font-family: 'Montserrat', sans-serif;
            margin: 15px 0;
            display: block;
        }

        .card .btn-fake {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-main);
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-flex; align-items: center; gap: 10px;
            font-size: 0.9rem;
        }

        .card:hover .btn-fake {
            background: var(--text-main);
            color: var(--body-bg);
        }

        /* --- واجهة عرض المنتج الكاملة (Product Showcase Modal) --- */
        .product-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none; align-items: center; justify-content: center;
        }

        .product-modal.active { display: flex; }
