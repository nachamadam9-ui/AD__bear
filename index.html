       
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر AD__bear 🐻</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #1a1a1a; --accent: #25d366; --bg: #0d0d0d; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 0; }
        header { text-align: center; padding: 50px 20px; background: #1a1a1a; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1100px; margin: auto; padding: 20px; }
        
        .card { background: #1a1a1a; border-radius: 20px; overflow: hidden; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: scale(1.02); border-color: var(--accent); }
        .card img { width: 100%; height: 350px; object-fit: cover; pointer-events: none; }
        .card-info { padding: 15px; text-align: center; }
        .price { color: var(--accent); font-size: 1.5rem; font-weight: bold; display: block; }

        /* النافذة المنبثقة */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; color: black; width: 90%; max-width: 500px; border-radius: 20px; padding: 20px; position: relative; text-align: center; }
        .modal img { width: 100%; border-radius: 15px; margin-bottom: 15px; max-height: 300px; object-fit: cover; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 25px; cursor: pointer; color: #000; }
        
        .whatsapp-link { 
            display: inline-block; background: var(--accent); color: white; 
            padding: 15px 30px; text-decoration: none; border-radius: 10px; 
            font-weight: bold; font-size: 1.2rem; margin-top: 20px; width: 80%;
        }
    </style>
</head>
<body>

    <header>
        <h1>متجر AD__bear 🐻✨</h1>
        <p>اضغط على أي منتج لطلبه</p>
    </header>

    <div class="container">
        <div class="card" onclick="openMe('قميص كاجوال', '220 درهم', '0e03061c982d648fbfa56f692930f03b.jpg')">
            <img src="0e03061c982d648fbfa56f692930f03b.jpg">
            <div class="card-info">
                <h3>قميص كاجوال أنيق</h3>
                <span class="price">220 درهم</span>
            </div>
        </div>

        <div class="card" onclick="openMe('هودي عصري', '199 درهم', '0e2bcdba3fc4e544b30e9af4d3e37ff6.jpg')">
            <img src="0e2bcdba3fc4e544b30e9af4d3e37ff6.jpg">
            <div class="card-info">
                <h3>هودي عصري مريح</h3>
                <span class="price">199 درهم</span>
            </div>
        </div>

        <div class="card" onclick="openMe('جاكيت شتوي', '294 درهم', 'd24dbf3ebd288e1eb642aeaf6e189fbd.jpg')">
            <img src="d24dbf3ebd288e1eb642aeaf6e189fbd.jpg">
            <div class="card-info">
                <h3>جاكيت شتوي فاخر</h3>
                <span class="price">294 درهم</span>
            </div>
        </div>
    </div>

    <div id="popBox" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeMe()">&times;</span>
            <img id="popImg" src="">
            <h2 id="popTitle"></h2>
            <h3 id="popPrice" style="color: green;"></h3>
            <p>هل تريد طلب هذا المنتج عبر الواتساب؟</p>
            <a id="waLink" href="#" target="_blank" class="whatsapp-link">
                <i class="fab fa-whatsapp"></i> إرسال الطلب الآن
            </a>
        </div>
    </div>

    <script>
        function openMe(title, price, img) {
            document.getElementById('popTitle').innerText = title;
            document.getElementById('popPrice').innerText = price;
            document.getElementById('popImg').src = img;
            
            // تجهيز نص الرسالة للواتساب
            let message = "مرحباً متجر AD__bear، أريد طلب: " + title + " بسعر " + price;
            let encodedMessage = encodeURIComponent(message);
            document.getElementById('waLink').href = "https://wa.me/212770940367?text=" + encodedMessage;
            
            document.getElementById('popBox').style.display = 'flex';
        }

        function closeMe() {
            document.getElementById('popBox').style.display = 'none';
        }

        // إغلاق النافذة إذا ضغط المستخدم خارجها
        window.onclick = function(event) {
            if (event.target == document.getElementById('popBox')) {
                closeMe();
            }
        }
    </script>

</body>
</html>
