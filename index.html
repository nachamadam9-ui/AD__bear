<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AD__bear Luxury</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"><style>
:root {
  --bg:#000;
  --card:#0d0d0d;
  --royal:#6a040f;
  --white:#fff;
}

body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--white);
  margin:0;
}

header{
  text-align:center;
  padding:40px 20px;
  border-bottom:2px solid var(--royal);
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

.card{
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
  border:1px solid var(--royal);
}

.card img{
  width:100%;
  height:300px;
  object-fit:cover;
}

.card-info{
  padding:15px;
  text-align:center;
}

.price{
  color:var(--royal);
  font-weight:bold;
  font-size:18px;
}

.btn{
  background:var(--royal);
  border:none;
  color:white;
  padding:10px;
  width:100%;
  border-radius:6px;
  cursor:pointer;
}

#modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
}

#modal.active{
  display:flex;
}

.modal-box{
  background:#111;
  padding:20px;
  border-radius:12px;
  max-width:400px;
  width:90%;
  text-align:center;
  animation:fade .3s ease;
}

@keyframes fade{
  from{opacity:0; transform:scale(.9)}
  to{opacity:1; transform:scale(1)}
}

.close{
  position:absolute;
  top:15px;
  left:20px;
  font-size:25px;
  cursor:pointer;
}

.wa{
  display:block;
  margin-top:15px;
  background:#25d366;
  padding:12px;
  border-radius:8px;
  text-decoration:none;
  color:white;
  font-weight:bold;
}

</style></head><body><header>
<h1>AD__bear Luxury 🐻🍷</h1>
</header><div class="container" id="products"></div><div id="modal">
<div class="modal-box">
<span class="close"
