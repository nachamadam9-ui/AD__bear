<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD__bear Stealth Luxury 🐻</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-black: #000000;
            --card-grey: #0a0a0a;
            --border: #1a1a1a;
            --text-white: #ffffff;
            --text-muted: #888888;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-black); 
            color: var(--text-white); 
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* الهيدر */
        header { 
            text-align: center; padding: 100px 20px; 
            border-bottom: 1px solid var(--border);
        }
        header h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: 5px; margin: 0; }
        header p { color: var(--text-muted); font-size: 1.1rem; margin-top: 15px; }

        /* حاوية المنتجات */
        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px; max-width: 1300px; margin: auto; padding: 50px 20px;
        }

        .card { 
            background: var(--card-grey); 
            border: 1px solid var(--border);
            cursor: pointer; transition: 0.4s ease;
        }
        .card:hover { border-color: var(--text-muted); transform: scale(1.02); }
        
        .image-box { width: 100%; height: 450px; background: #050505; }
        .card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.6s; }
        .card:hover img { filter: grayscale(0%); }

        .card-info { padding: 25px; text-align: center; }
        .card-info h3 { font-size: 1.2rem; margin: 0; letter-spacing: 1px; }
        .price { font-size: 1.5rem; font-weight: 900; margin-top: 10px; display: block; }

        /* --- نافذة العرض الكاملة (Fullscreen Modal) --- */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-black); z-index: 10000; 
            display: none; flex-direction: column; 
            overflow-y: auto; align-items: center;
        }

        /* زر الإغلاق الفخم */
        .close-modal { 
            position: fixed; top: 30px; left: 30px; 
            font-size: 2.5rem; cursor: pointer; color: white; z-index: 10001; 
        }

        .modal-body { width: 100%; max-width: 900px; padding-bottom: 100px; }

        /* عرض الصورة كاملاً في البداية */
        .full-img-container { width: 100%; margin-top: 50px; }
        .full-img-container img { width: 100%; border-radius: 0; box-shadow: 0 0 50px rgba(255,255,255,0.05); }

        /* منطقة الطلب أسفل الصورة */
        .order-section { 
            padding: 40px 20px; text-align: center; 
            border-top: 1px solid var(--border); margin-top: 30px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .order-section h2 { font-size: 2.5rem; margin-bottom: 10px; }
        .modal-price { font-size: 3rem; font-weight: 900; margin-bottom: 20px; color: var(--text-white); }
        .modal-desc { color: var(--text-muted); font-size: 1.2rem; margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto; }

        .btn-whatsapp { 
            background: #ffffff; color: #000000; padding: 22px 50px; 
            text-decoration: none; font-weight: 900; font-size: 1.4rem; 
            display: inline-flex; align-items: center; gap: 15px;
            transition: 0.3s;
        }
        .btn-whatsapp:hover { background: #888888; color: white; }

        footer { text-align: center; padding: 50px; color: #333; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <header>
        <h1>AD__bear</h1>
        <p>الأسود والرمادي | الفخامة في أبسط صورها</p>
    </header>

    <div class="container">
        <div class="card" onclick="openMe('سترة Charcoal مضلعة', '250 DH', '1775131386342_edit_165168220411784.png', 'سترة مضلعة صوفية عالية الجودة، تصميم إنسيابي للرجل العصري الذي يعشق التفاصيل.')">
            <div class="image-box"><img src="1775131386342_edit_165168220411784.png"></div>
            <div class="card-info">
                <h3>Charcoal Ribbed</h3>
                <span class="price">250 DH</span>
            </div>
        </div>

        <div class="card" onclick="openMe('كنزة Cream المخططة', '250 DH', '1775131549809_edit_165190750270682.png', 'مزيج البيج والأسود المخطط، تصميم كلاسيكي يفرض حضوره في أي مكان.')">
            <div class="image-box"><img src="1775131549809_edit_165190750270682.png"></div>
            <div class="card-info">
                <h3>Cream Beige Stripe</h3>
                <span class="price">250 DH</span>
            </div>
        </div>

        <div class="card" onclick="openMe('سترة Navy الملكية', '250 DH', 'Screenshot_20260402_130701.jpg', 'اللون النيلي بلمسات غامقة، صوف طبيعي 100% لراحة لا توصف.')">
            <div class="image-box"><img src="Screenshot_20260402_130701.jpg"></div>
            <div class="card-info">
                <h3>Classic Navy</h3>
                <span class="price">250 DH</span>
            </div>
        </div>

        <div class="card" onclick="openMe('سترة Dark Grey شتوية', '250 DH', 'Screenshot_20260402_130639_edit_165151901325644.jpg', 'الرمادي الداكن المفضل لدينا، قطعة تكتمل بها مجموعتك الشتوية الفخمة.')">
            <div class="image-box"><img src="Screenshot_20260402_130639_edit_165151901325644.jpg"></div>
            <div class="card-info">
                <h3>Midnight Grey</h3>
                <span class="price">250 DH</span>
            </div>
        </div>
    </div>

    <div id="fullView" class="modal">
        <span class="close-modal" onclick="closeMe()">&times;</span>
        <div class="modal-body">
            <div class="full-img-container">
                <img id="popImg" src="">
            </div>
            
            <div class="order-section">
                <h2 id="popTitle"></h2>
                <div class="modal-price" id="popPrice"></div>
                <p class="modal-desc" id="popDesc"></p>
                <a id="waLink" href="#" target="_blank" class="btn-whatsapp">
                    <i class="fab fa-whatsapp"></i> إرسال الطلب عبر واتساب
                </a>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 AD__bear Stealth Luxury
    </footer>

    <script>
        function openMe(title, price, img, desc) {
            document.getElementById('popTitle').innerText = title;
            document.getElementById('popPrice').innerText = price;
            document.getElementById('popDesc').innerText = desc;
            document.getElementById('popImg').src = img;
            
            let message = "مرحباً متجر AD__bear، أريد طلب القطعة الفاخرة: " + title;
            document.getElementById('waLink').href = "https://wa.me/212770940367?text=" + encodeURIComponent(message);
            
            document.getElementById('fullView').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeMe() {
            document.getElementById('fullView').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>

</body>
</html>
