<!DOCTYPE html>

    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-black: #000000;
            --card-grey: #0a0a0a;
            --border-muted: #1a1a1a;
            --text-main: #f5f5f5;
            --accent-color: #5d0f1b; /* العنابي الملكي */
            --price-color: #c41e3a;
        }

        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-black); margin: 0; color: var(--text-main); }
        
        header { padding: 80px 20px; text-align: center; border-bottom: 1px solid var(--border-muted); }
        header h1 { font-family: 'Montserrat', sans-serif; font-size: 3.5rem; margin: 0; color: var(--text-main); }

        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: auto; padding: 40px 20px; }

        /* البطاقات */
        .card { 
            background: var(--card-grey); border-radius: 20px; overflow: hidden; 
            border: 1px solid var(--border-muted); cursor: pointer; transition: 0.4s;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent-color); }
        
        .img-box { width: 100%; height: 400px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.5s; }
        .card:hover img { filter: grayscale(0); transform: scale(1.05); }

        .info { padding: 25px; text-align: center; }
        .price { color: var(--price-color); font-size: 1.8rem; font-weight: 900; display: block; margin: 10px 0; }
        .btn-view { border: 1px solid #444; padding: 8px 20px; border-radius: 50px; font-size: 0.9rem; }

        /* النافذة المنبثقة المصلحة */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 10000; 
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(15px);
        }
        .modal.active { display: flex; }

        .modal-content { 
            background: #fff; color: #000; width: 90%; max-width: 1000px; 
            border-radius: 30px; display: flex; flex-wrap: wrap; overflow: hidden;
            position: relative; animation: zoom 0.3s ease;
        }
        @keyframes zoom { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal-left { flex: 1.2; min-width: 300px; background: #f0f0f0; }
        .modal-left img { width: 100%; height: 100%; object-fit: cover; max-height: 600px; }

        .modal-right { flex: 1; min-width: 300px; padding: 40px; text-align: right; display: flex; flex-direction: column; justify-content: center; }
        .modal-price { color: var(--price-color); font-size: 2.5rem; font-weight: 900; margin: 15px 0; }
        
        .btn-wa { 
            background: var(--accent-color); color: #fff; padding: 18px; 
            text-decoration: none; border-radius: 15px; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .close { position: absolute; top: 20px; left: 20px; font-size: 2rem; cursor: pointer; color: #000; z-index: 100; }

        @media (max-width: 768px) { .modal-content { flex-direction: column; height: 90vh; overflow-y: auto; } }
    </style>
</head>
